schema: spec-driven

context: |
  Tech stack: Python/Streamlit (existing) → React/FastAPI (target)
  Architecture: Monolithic Streamlit app → React SPA + FastAPI + Supabase
  Testing: pytest available (unit tests for backend logic)
  Style: ruff for linting, black for formatting (Python); ESLint/Prettier (JS/TS)

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    tdd: false
    test_command: "pytest"
  verify:
    test_command: "pytest"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  runner: pytest
  command: pytest
  unit: AVAILABLE
  integration: NOT INSTALLED
  e2e: NOT INSTALLED
  coverage: AVAILABLE
  coverage_command: pytest --cov
  linter: ruff
  type_checker: NOT AVAILABLE
  formatter: black